<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
   <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

  </head>
  <body>
    <a-scene>
      <assets>
       <a-asset-item id="car" src="Assets/Car.obj"></a-asset-item>
       <a-asset-item id="Lego" src="Assets/Lego.obj"></a-asset-item>

      </assets>
      <a-obj-model src="#car" position="-1 0 -10" rotation="-90 90 -46" scale=".03 .03 .03" color="#228B22"></a-obj-model>
            <a-obj-model src="#Lego" position="-0.5 0 -10.5" rotation="-90 90 140" scale=".008 .008 .008" color="#F2CD37"></a-obj-model>

      <a-obj-model src="#car" position="-0 0 -15" rotation="-90 90 -45" scale=".03 .03 .03" color="#EF2D5E"></a-obj-model>
            <a-obj-model src="#Lego" position=".2 0 -15.2" rotation="-90 90 140" scale=".008 .008 .008" color="#F2CD37"></a-obj-model>

      <a-box position="2 0 -17" rotation="0 45 0" scale="5 1 .1" color="white" material="emissive: #FF0000; emissiveIntensity: 5;"></a-box>
      <a-box position="1 0 -12" rotation="0 45 0" scale="5 1 .1" color="white" material="emissive: #00FF00; emissiveIntensity: 5;"></a-box>

      //a-sphere position="0 1.25 -5" radius="1.2w5" color="#EF2D5E"></a-sphere>
      //a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-sky color="#ECECEC"></a-sky>
      <a-entity environment="preset: starry;"></a-entity>
    </a-scene>
  </body>
</html>
